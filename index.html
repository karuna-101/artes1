<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artest - Digital Paint to 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --bg-dark: #0d0d12;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            display: flex; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            background: var(--bg-dark);
            color: white;
        }

        #canvas-container { 
            width: 400px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 24px; 
            background: #111118;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #three-container { 
            flex: 1; 
            background: radial-gradient(circle at center, #1e1f29, #0d0d12);
            position: relative;
        }

        h3 { 
            margin: 0 0 8px 0; 
            font-size: 20px; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { font-size: 13px; color: #71717a; margin-bottom: 20px; }

        canvas#paintCanvas { 
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            cursor: crosshair; 
            background: white; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            image-rendering: auto;
            touch-action: none;
        }

        .controls { 
            margin-top: 24px; 
            display: flex; 
            flex-direction: column;
            gap: 16px; 
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        input[type="color"] {
            appearance: none;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 50%;
            border: 2px solid white;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: rgba(255,255,255,0.1); }

        #scan-indicator {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Mobile adjustments */
        @media (max-width: 800px) {
            body { flex-direction: column; }
            #canvas-container { width: 100%; height: 50%; border-right: none; border-bottom: 1px solid var(--border); }
            #three-container { height: 50%; }
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <h3>Artest Digital</h3>
    <p>Warnai line-art di bawah. Hasilnya akan langsung muncul pada objek 3D di samping.</p>
    
    <canvas id="paintCanvas" width="1024" height="1024"></canvas>
    
    <div class="controls">
        <div class="control-row">
            <label style="font-size: 12px; color: #a1a1aa;">PILIH WARNA</label>
            <input type="color" id="colorPicker" value="#6366f1">
        </div>
        <button onclick="clearCanvas()">Hapus Semua</button>
    </div>
</div>

<div id="three-container">
    <div id="scan-indicator">3D Preview Mode</div>
</div>

<script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- SETUP CANVAS 2D ---
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    let painting = false;

    // Load Line Art
    const lineArt = new Image();
    lineArt.src = 'assets/line art.png';
    lineArt.onload = () => {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(lineArt, 0, 0, canvas.width, canvas.height);
        updateTexture();
    };

    function startPosition(e) { painting = true; draw(e); }
    function finishedPosition() { painting = false; ctx.beginPath(); updateTexture(); }
    
    function draw(e) {
        if (!painting) return;
        const rect = canvas.getBoundingClientRect();
        
        // Handle Mouse and Touch coordinates
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        ctx.lineWidth = 20;
        ctx.lineCap = "round";
        ctx.strokeStyle = colorPicker.value;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
        updateTexture();
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', finishedPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
    canvas.addEventListener('touchend', finishedPosition);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    // --- SETUP THREE.JS ---
    const container = document.getElementById('three-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const texture = new THREE.CanvasTexture(canvas);
    texture.flipY = false; // Important for many GLB models

    // Load User Model
    const loader = new GLTFLoader();
    let model;
    loader.load('assets/marker 1.glb', (gltf) => {
        model = gltf.scene;
        model.traverse((node) => {
            if (node.isMesh) {
                node.material.map = texture;
                node.material.needsUpdate = true;
            }
        });
        
        // Auto-center and scale model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center); // Center the model
        
        scene.add(model);
        console.log("Model Loaded Successfully");
    }, undefined, (error) => {
        console.error("Error loading model:", error);
    });

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    camera.position.z = 5;

    function updateTexture() {
        texture.needsUpdate = true;
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    window.clearCanvas = () => {
        if(confirm("Hapus semua coretan?")) {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (lineArt.complete) ctx.drawImage(lineArt, 0, 0, canvas.width, canvas.height);
            updateTexture();
        }
    };

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>
</body>
</html>
