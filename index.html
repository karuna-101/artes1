<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artest - AR Coloring Experience</title>
    
    <!-- Dependencies -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-container">
        <!-- Coloring Section -->
        <section id="coloring-section">
            <h1>Artest Preview</h1>
            <p>Warnai line-art di bawah, lalu klik <b>Scan & Update</b> untuk menempelkan karyamu ke objek 3D!</p>
            
            <canvas id="drawingCanvas"></canvas>

            <div class="controls">
                <div class="row">
                    <div class="row-header">
                        <label>Ukuran Kuas</label>
                        <span id="brushSizeDisplay" style="font-size: 12px; color: #6366f1;">15px</span>
                    </div>
                    <input type="range" id="penSize" min="5" max="60" value="15">
                </div>

                <div class="row">
                    <label>Pilih Warna</label>
                    <div class="color-palette">
                        <div class="color-swatch active" style="background:#6366f1" data-color="#6366f1"></div>
                        <div class="color-swatch" style="background:#f43f5e" data-color="#f43f5e"></div>
                        <div class="color-swatch" style="background:#10b981" data-color="#10b981"></div>
                        <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
                        <div class="color-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
                        <div class="color-swatch" style="background:#000000" data-color="#000000"></div>
                    </div>
                </div>

                <div class="buttons">
                    <button id="clearBtn">Hapus</button>
                    <button id="scanBtn">Scan & Update 🚀</button>
                </div>
            </div>
        </section>

        <!-- Preview Section -->
        <section id="preview-section">
            <div id="preview-label">3D Preview</div>
            <div id="status-indicator">Tunggu kursor di atas...</div>

            <a-scene embedded vr-mode-ui="enabled: false">
                <a-assets>
                    <!-- Menggunakan file .glb Anda sebagai objek utama -->
                    <a-asset-item id="modelAsset" src="assets/marker 1.glb"></a-asset-item>
                </a-assets>

                <a-entity 
                    id="coloredObject"
                    gltf-model="#modelAsset" 
                    scale="2 2 2" 
                    position="0 0 -3" 
                    rotation="0 45 0"
                    animation="property: rotation; to: 0 405 0; loop: true; dur: 20000; easing: linear">
                </a-entity>

                <a-sky color="#0d0d12"></a-sky>
                <a-light type="ambient" intensity="0.8"></a-light>
                <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
            </a-scene>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
