<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artest - Digital Coloring to 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --bg-dark: #0d0d12;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            background: var(--bg-dark);
            color: white;
            overscroll-behavior: none;
        }

        #coloring-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
        }

        header { text-align: center; margin-bottom: 24px; }
        h1 { margin: 0 0 4px 0; font-size: 26px; background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin: 0; font-size: 14px; color: #71717a; }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1;
            margin-bottom: 24px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 4px solid #1e1f29;
        }

        canvas#paintCanvas { 
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        #scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-gradient);
            z-index: 5;
            box-shadow: 0 0 20px #ec4899;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes scan-move {
            0% { top: 0; opacity: 1; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        #scan-line.scanning { animation: scan-move 2s ease-in-out infinite; }

        .controls { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; }

        .row { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: 1px; }

        .color-palette { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 3px solid #1e1f29; transition: transform 0.2s; }
        .color-swatch.active { border-color: white; transform: scale(1.2); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .buttons { display: flex; gap: 16px; width: 100%; }
        button { flex: 1; padding: 18px; border-radius: 18px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        button#clearBtn { background: #1e1f29; color: #a1a1aa; }
        button#scanBtn { background: var(--primary-gradient); color: white; box-shadow: 0 10px 25px rgba(236, 72, 153, 0.3); }

        /* Result Overlay */
        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e1f29, #08080a);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }

        #result-overlay.active { transform: translateY(0); }

        #overlay-header {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #overlay-label { background: var(--glass); backdrop-filter: blur(12px); padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; border: 1px solid var(--border); }

        #closeBtn { position: absolute; right: 25px; top: 0; background: #3f3f46; padding: 10px 20px; border-radius: 12px; font-size: 14px; }

        #three-container { flex: 1; width: 100%; }
    </style>
</head>
<body>

<section id="coloring-section">
    <header>
        <h1>Artest Digital</h1>
        <p>Warnai line-art di bawah, lalu tekan <b>Mulai Scan</b></p>
    </header>
    
    <div id="canvas-container">
        <div id="scan-line"></div>
        <canvas id="paintCanvas" width="1024" height="1024"></canvas>
    </div>

    <div class="controls">
        <div class="row">
            <label>🎨 Pilih Warna</label>
            <div class="color-palette">
                <div class="color-swatch active" style="background:#6366f1" data-color="#6366f1"></div>
                <div class="color-swatch" style="background:#f43f5e" data-color="#f43f5e"></div>
                <div class="color-swatch" style="background:#10b981" data-color="#10b981"></div>
                <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
                <div class="color-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
                <div class="color-swatch" style="background:#000000" data-color="#000000"></div>
                <div class="color-swatch" style="background:#ffffff" data-color="#ffffff"></div>
            </div>
        </div>
        <div class="buttons">
            <button id="clearBtn">Hapus Semua</button>
            <button id="scanBtn">Mulai Scan 🚀</button>
        </div>
    </div>
</section>

<div id="result-overlay">
    <div id="overlay-header">
        <div id="overlay-label">Hasil Artest 3D</div>
        <button id="closeBtn">✕ TUTUP</button>
    </div>
    <div id="three-container"></div>
</div>

<script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- SETUP CANVAS ---
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const colorSwatches = document.querySelectorAll('.color-swatch');
    const scanBtn = document.getElementById('scanBtn');
    const scanLine = document.getElementById('scan-line');
    const resultOverlay = document.getElementById('result-overlay');
    const closeBtn = document.getElementById('closeBtn');
    let painting = false;
    let currentColor = '#6366f1';

    // Load Template
    const lineArt = new Image();
    lineArt.src = 'assets/line art.png';
    lineArt.onload = () => {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(lineArt, 0, 0, canvas.width, canvas.height);
    };

    function startPosition(e) { painting = true; draw(e); }
    function finishedPosition() { painting = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!painting) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        ctx.lineWidth = 18;
        ctx.lineCap = "round";
        ctx.strokeStyle = currentColor;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', finishedPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
    canvas.addEventListener('touchend', finishedPosition);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    colorSwatches.forEach(swatch => {
        swatch.addEventListener('click', () => {
            colorSwatches.forEach(s => s.classList.remove('active'));
            swatch.classList.add('active');
            currentColor = swatch.getAttribute('data-color');
        });
    });

    // --- SETUP THREE.JS ---
    const container = document.getElementById('three-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const texture = new THREE.CanvasTexture(canvas);
    texture.flipY = false;

    const loader = new GLTFLoader();
    let model;
    loader.load('assets/marker 1.glb', (gltf) => {
        model = gltf.scene;
        
        // Stop internal animations if any
        if (gltf.animations && gltf.animations.length > 0) {
            const mixer = new THREE.AnimationMixer(model);
            mixer.stopAllAction();
        }

        model.traverse((node) => {
            if (node.isMesh && node.material) {
                node.material.map = texture;
                node.material.needsUpdate = true;
                node.material.side = THREE.DoubleSide;
            }
        });
        
        // PERFECT CENTERING & SCALING
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        
        // Scale model to fit a unit box approximately
        const maxDim = Math.max(size.x, size.y, size.z);
        const scaleFactor = 2.5 / maxDim;
        model.scale.setScalar(scaleFactor);
        
        // Reset position to center it precisely at the origin after scaling
        model.position.x = -center.x * scaleFactor;
        model.position.y = -center.y * scaleFactor;
        model.position.z = -center.z * scaleFactor;
        
        scene.add(model);
    });

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(2, 4, 5);
    scene.add(light);

    camera.position.set(0, 0, 6);
    camera.lookAt(0, 0, 0);

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    // SCAN LOGIC
    scanBtn.addEventListener('click', () => {
        scanBtn.disabled = true;
        scanBtn.innerText = "Scanning...";
        scanLine.classList.add('scanning');

        setTimeout(() => {
            texture.needsUpdate = true;
            resultOverlay.classList.add('active');
            scanBtn.disabled = false;
            scanBtn.innerText = "Mulai Scan 🚀";
            scanLine.classList.remove('scanning');
        }, 2100);
    });

    closeBtn.addEventListener('click', () => { resultOverlay.classList.remove('active'); });

    window.clearCanvas = () => {
        if(confirm("Hapus semua?")) {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (lineArt.complete) ctx.drawImage(lineArt, 0, 0, canvas.width, canvas.height);
        }
    };

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>
</body>
</html>
